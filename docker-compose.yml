version: '3.8'

services:
  app:
    build: .
    container_name: bedrock_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - app-network

  web:
    image: nginx:latest
    container_name: bedrock_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
